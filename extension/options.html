<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Marginama Video Review — Options</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      font: 14px/1.55 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      letter-spacing: -0.005em;
      color: #ededed;
      background: #09090b;
      margin: 0;
      padding: 48px 32px;
      min-height: 100vh;
      background-image:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0) 0px,
          rgba(255,255,255,0) 47px,
          rgba(255,255,255,0.03) 48px,
          rgba(255,255,255,0) 49px
        );
    }
    .container {
      position: relative;
      max-width: 560px;
      margin: 0 auto;
      background: #111114;
      border: 1px solid #1f1f23;
      border-radius: 12px;
      padding: 32px;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.03) inset,
        0 18px 40px rgba(0,0,0,0.5);
    }
    .container::before {
      content: '';
      position: absolute;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      width: 540px; height: 380px;
      background: radial-gradient(ellipse at center, rgba(6,182,212,0.22) 0%, rgba(6,182,212,0) 65%);
      pointer-events: none; z-index: -1;
      filter: blur(10px);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .mark {
      width: 26px; height: 26px;
      display: inline-flex; align-items: center; justify-content: center;
      background: #111114; border: 1px solid #1f1f23; border-radius: 6px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 12px; font-weight: 500;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
      color: #fafafa;
      letter-spacing: -0.015em;
    }
    p.lede {
      color: #a1a1aa;
      margin: 4px 0 24px;
      font-size: 13px;
    }
    label {
      display: block;
      font-weight: 500;
      margin-top: 18px;
      font-size: 11.5px;
      color: #d4d4d8;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      margin-top: 6px;
      background: #0c0c0f;
      border: 1px solid #1f1f23;
      border-radius: 6px;
      font: inherit;
      font-size: 13.5px;
      color: #ededed;
      transition: border-color 120ms, box-shadow 120ms;
    }
    input::placeholder { color: #52525b; }
    input:focus {
      outline: none;
      border-color: #06b6d4;
      box-shadow: 0 0 0 3px rgba(6,182,212,0.22);
    }
    .hint {
      color: #71717a;
      font-size: 12px;
      margin-top: 6px;
      line-height: 1.5;
    }
    .hint code {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11.5px;
      background: #0c0c0f;
      border: 1px solid #1f1f23;
      padding: 1px 5px;
      border-radius: 4px;
      color: #d4d4d8;
    }
    .actions {
      margin-top: 28px;
      display: flex;
      gap: 8px;
    }
    button {
      padding: 9px 16px;
      font: inherit;
      font-weight: 500;
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background-color 120ms, border-color 120ms, color 120ms;
    }
    button.primary {
      background: #06b6d4;
      color: #04181d;
      font-weight: 600;
    }
    button.primary:hover { background: #22c8dc; }
    button.secondary {
      background: #111114;
      color: #a1a1aa;
      border-color: #1f1f23;
    }
    button.secondary:hover { border-color: #3f3f46; color: #ededed; }
    .status {
      margin-top: 14px;
      font-size: 12.5px;
      min-height: 18px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      letter-spacing: 0.02em;
    }
    .status.ok { color: #06b6d4; }
    .status.err { color: #f87171; }
    a { color: #06b6d4; }
    a:hover { color: #22c8dc; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <span class="mark" aria-hidden="true">§</span>
      <h1>Marginama Video Review</h1>
    </div>
    <p class="lede">Connect this extension to your Marginama account.</p>

    <label for="apiBase">Marginama URL</label>
    <input type="text" id="apiBase" placeholder="https://marginama.com" />
    <div class="hint">Default: <code>https://marginama.com</code></div>

    <label for="apiToken">API token</label>
    <input type="password" id="apiToken" placeholder="sk_…" autocomplete="off" />
    <div class="hint">
      Generate a token in Marginama at
      <a href="#" id="tokenLink" target="_blank">Settings → API Tokens</a>.
      It&rsquo;s shown exactly once when you create it.
    </div>

    <div class="actions">
      <button class="primary" id="saveBtn">Save</button>
      <button class="secondary" id="testBtn">Test connection</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
