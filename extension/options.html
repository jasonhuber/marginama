<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Marginama Video Review — Options</title>
  <style>
    :root { color-scheme: light; }
    body {
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #111827;
      background: #f9fafb;
      margin: 0;
      padding: 32px;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 28px;
    }
    h1 { font-size: 18px; margin: 0 0 4px 0; }
    p.lede { color: #6b7280; margin: 0 0 20px 0; font-size: 13px; }
    label { display: block; font-weight: 600; margin-top: 16px; font-size: 12px; color: #374151; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      margin-top: 4px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font: inherit;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    .hint { color: #6b7280; font-size: 12px; margin-top: 4px; }
    .actions { margin-top: 24px; display: flex; gap: 8px; }
    button {
      padding: 8px 14px;
      font: inherit;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
    }
    button.primary { background: #2563eb; color: #fff; }
    button.primary:hover { background: #1d4ed8; }
    button.secondary {
      background: #fff; color: #374151; border-color: #d1d5db;
    }
    button.secondary:hover { background: #f9fafb; }
    .status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
    }
    .status.ok { color: #047857; }
    .status.err { color: #b91c1c; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Marginama Video Review</h1>
    <p class="lede">Connect this extension to your Marginama account.</p>

    <label for="apiBase">Marginama URL</label>
    <input type="text" id="apiBase" placeholder="https://marginama.com" />
    <div class="hint">Default: <code>https://marginama.com</code></div>

    <label for="apiToken">API token</label>
    <input type="password" id="apiToken" placeholder="sk_…" autocomplete="off" />
    <div class="hint">
      Generate a token in Marginama at
      <a href="#" id="tokenLink" target="_blank">Settings → API Tokens</a>.
      It&rsquo;s shown exactly once when you create it.
    </div>

    <div class="actions">
      <button class="primary" id="saveBtn">Save</button>
      <button class="secondary" id="testBtn">Test connection</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
