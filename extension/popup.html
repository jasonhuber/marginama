<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Marginama Video Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      font: 13px/1.45 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      letter-spacing: -0.005em;
      width: 280px;
      margin: 0;
      padding: 16px;
      background: #09090b;
      color: #ededed;
      background-image:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0) 0px,
          rgba(255,255,255,0) 47px,
          rgba(255,255,255,0.025) 48px,
          rgba(255,255,255,0) 49px
        );
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 12px 0;
    }
    .mark {
      width: 22px; height: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      background: #111114; border: 1px solid #1f1f23; border-radius: 5px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px; font-weight: 500; color: #ededed;
    }
    .brand h1 {
      font-size: 13.5px;
      font-weight: 600;
      margin: 0;
      color: #fafafa;
      letter-spacing: -0.01em;
    }
    p.lede {
      margin: 0 0 14px 0;
      color: #a1a1aa;
      font-size: 12px;
      line-height: 1.5;
    }
    a.button {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      font-size: 12.5px;
      margin-bottom: 6px;
      border: 1px solid transparent;
      transition: background-color 120ms, border-color 120ms, color 120ms;
    }
    a.button.primary {
      background: #06b6d4;
      color: #04181d;
      font-weight: 600;
    }
    a.button.primary:hover { background: #22c8dc; }
    a.button.secondary {
      background: #111114;
      color: #a1a1aa;
      border-color: #1f1f23;
    }
    a.button.secondary:hover { border-color: #3f3f46; color: #ededed; }
    #status {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #1f1f23;
      font-size: 11px;
      color: #71717a;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      letter-spacing: 0.02em;
    }
    #status.ok { color: #06b6d4; }
  </style>
</head>
<body>
  <div class="brand">
    <span class="mark" aria-hidden="true">§</span>
    <h1>Marginama</h1>
  </div>
  <p class="lede">Open a YouTube, Sybill, or Drive video page — the capture panel appears automatically.</p>
  <a class="button primary" href="#" id="openReviews">Open video reviews</a>
  <a class="button secondary" href="#" id="openOptions">Extension settings</a>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
