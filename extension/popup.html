<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Marginama Video Review</title>
  <style>
    body {
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 260px;
      margin: 0;
      padding: 14px;
      color: #111827;
    }
    h1 { font-size: 14px; margin: 0 0 6px 0; }
    p { margin: 0 0 10px 0; color: #6b7280; font-size: 12px; }
    a.button {
      display: block;
      text-align: center;
      padding: 8px 12px;
      border-radius: 6px;
      background: #2563eb;
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 6px;
    }
    a.button.secondary {
      background: #ffffff;
      color: #374151;
      border: 1px solid #d1d5db;
    }
    a.button:hover { filter: brightness(1.05); }
    #status { margin-top: 8px; font-size: 11px; color: #6b7280; }
  </style>
</head>
<body>
  <h1>Marginama Video Review</h1>
  <p>Open a YouTube, Sybill, or Drive video page — the sidebar pops up automatically.</p>
  <a class="button" href="#" id="openReviews">Open Video Reviews</a>
  <a class="button secondary" href="#" id="openOptions">Extension settings</a>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
